name: "Sample React App CI pipeline / workflow"

on:
  push:
    branches: 
        - main
        - master

jobs:
    build-and-test:
        runs-on: ubuntu-latest
        steps:
            - name: "Checkout code"
              uses: actions/checkout@v3
            
            - name: "Setup Node.js"
              uses: actions/setup-node@v4
              with:
                node-version: 20
            
            - name: "Install dependencies"
              run: npm install
            
            - name: "Build project"
              run: npm run build
            
            - name: "Lint code"
              run: npm run lint
            
            - name: "Check version"
              run: node --version  